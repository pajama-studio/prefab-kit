name: Release
# Tokenless npm publish via TRUSTED PUBLISHING (OIDC): npmjs.com trusts this
# exact repo + workflow file to publish, no NPM_TOKEN anywhere. Configure once
# on npmjs.com → package → Settings → Trusted Publisher → GitHub Actions:
#   Organization: pajama-studio · Repository: prefab-kit
#   Workflow filename: release.yml · Allowed actions: npm publish
# Then releasing is just: bump version → git tag vX.Y.Z → git push --tags.
# Provenance attestation is automatic with trusted publishing.
on:
  push:
    tags: ["v*"]
permissions:
  contents: read
  id-token: write # OIDC token for npm trusted publishing
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          # never use caching in release builds (npm docs recommendation)
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm test
      - run: npm publish --access public
